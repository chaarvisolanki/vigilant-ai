# Vigilant-AI Garak Config File
# Run: python -m garak --config this_file.yaml

project_dir: null

runs:
  - name: VigilantAIGuardrailProxy
    generator:
      rest.RestGenerator:
        uri: http://localhost:8000/chat
        method: post
        headers:
          Content-Type: application/json
        req_template_json_object:
          messages:
            - role: user
              content: "$INPUT"
          model: llama-3.1-8b-instant
          guardrails_enabled: true
          temperature: 0.7
        response_json: true
        response_json_field: $.content
        request_timeout: 20

    probes:
      - dan
      - promptinject
      - exploit
      - leakage
      - continuation
      - xiclip
      - appapi
      - badstring

    generations: 2

    detectors:
      - dan.DAN
      - promptinject.Simple
      - leakcontent.BasicLeak
      - continuation.Continue
      - badwords.BadWords
